name: Build & Release

on:
  # Triggered when a git tag v*.*.* is pushed manually
  push:
    tags:
      - 'v*.*.*'

  # Triggered when a Release is created in the GitHub UI
  release:
    types: [created]

  # Manually trigger and attach artifacts to an existing release
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach artifacts to (e.g. v1.0.0)'
        required: true
        type: string

  # Called by release.yml to build after auto-tagging
  workflow_call:
    inputs:
      tag:
        description: 'Tag to build'
        required: true
        type: string

permissions:
  contents: write

# Resolve the target tag across all trigger types:
# workflow_call (from release.yml) → inputs.tag
# push: tags                       → github.ref_name
# release: [created]               → github.event.release.tag_name
# workflow_dispatch                → inputs.tag
env:
  TARGET_TAG: ${{ inputs.tag || github.ref_name || github.event.release.tag_name }}

jobs:
  # ── macOS arm64 (Apple Silicon) ─────────────────────────────────────────────
  build-mac-arm64:
    name: macOS arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_TAG }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Rebuild robotjs for Electron (arm64)
        run: pnpm exec electron-rebuild -f -w robotjs
        env:
          ELECTRON_RUN_AS_NODE: ''

      - name: Build & package
        run: pnpm exec electron-vite build && pnpm exec electron-builder --mac --arm64 --publish never
        env:
          ELECTRON_RUN_AS_NODE: ''

      - uses: actions/upload-artifact@v4
        with:
          name: dist-mac-arm64
          path: dist/*.dmg
          retention-days: 7

  # ── Windows x64 ──────────────────────────────────────────────────────────────
  build-win:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_TAG }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Rebuild robotjs for Electron (Windows x64)
        run: pnpm exec electron-rebuild -f -w robotjs
        env:
          ELECTRON_RUN_AS_NODE: ''

      - name: Build & package
        run: pnpm exec electron-vite build && pnpm exec electron-builder --win --x64 --publish never
        env:
          ELECTRON_RUN_AS_NODE: ''
          npm_execpath: npm

      - uses: actions/upload-artifact@v4
        with:
          name: dist-win
          path: |
            dist/*.exe
            dist/*.msi
          retention-days: 7

  # ── Upload artifacts to Release ───────────────────────────────────────────────
  upload-release:
    name: Upload to Release
    needs: [build-mac-arm64, build-win]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-mac-arm64
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: dist-win
          path: dist/

      - name: List artifacts
        run: ls -lh dist/

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Works for all three trigger types:
          # - push tag     → github.ref_name
          # - release UI   → github.event.release.tag_name
          # - manual run   → inputs.tag
          tag_name: ${{ env.TARGET_TAG }}
          # If the release already exists, just upload files (don't overwrite)
          # If it doesn't exist yet, create a draft
          draft: ${{ github.event_name != 'release' }}
          generate_release_notes: ${{ github.event_name != 'release' }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
