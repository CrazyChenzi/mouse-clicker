name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach artifacts to (e.g. v1.0.0)'
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        description: 'Tag to build'
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── macOS arm64 (Apple Silicon) ─────────────────────────────────────────────
  build-mac-arm64:
    name: macOS arm64
    runs-on: macos-latest
    env:
      # inputs is accessible in job-level env (NOT workflow-level env for workflow_call)
      TARGET_TAG: ${{ inputs.tag || github.ref_name || github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@v4
        # No explicit ref: GitHub uses the event's default checkout
        # push:tags       → checks out the pushed tag automatically
        # release:created → checks out the release target commit
        # workflow_call   → checks out the caller's branch (main w/ version bump)
        # workflow_dispatch → checks out the default branch

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Rebuild robotjs for Electron (arm64)
        run: pnpm exec electron-rebuild -f -w robotjs
        env:
          ELECTRON_RUN_AS_NODE: ''

      - name: Build & package
        run: pnpm exec electron-vite build && pnpm exec electron-builder --mac --arm64 --publish never
        env:
          ELECTRON_RUN_AS_NODE: ''

      - uses: actions/upload-artifact@v4
        with:
          name: dist-mac-arm64
          path: dist/*.dmg
          retention-days: 7

  # ── Windows x64 ──────────────────────────────────────────────────────────────
  build-win:
    name: Windows x64
    runs-on: windows-latest
    env:
      TARGET_TAG: ${{ inputs.tag || github.ref_name || github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Rebuild robotjs for Electron (Windows x64)
        run: pnpm exec electron-rebuild -f -w robotjs
        env:
          ELECTRON_RUN_AS_NODE: ''

      - name: Build & package
        run: pnpm exec electron-vite build && pnpm exec electron-builder --win --x64 --publish never
        env:
          ELECTRON_RUN_AS_NODE: ''
          npm_execpath: npm

      - uses: actions/upload-artifact@v4
        with:
          name: dist-win
          path: |
            dist/*.exe
            dist/*.msi
          retention-days: 7

  # ── Upload artifacts to Release ───────────────────────────────────────────────
  upload-release:
    name: Upload to Release
    needs: [build-mac-arm64, build-win]
    runs-on: ubuntu-latest
    env:
      TARGET_TAG: ${{ inputs.tag || github.ref_name || github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@v4
        # Needed for gh CLI authentication and git ls-remote

      - uses: actions/download-artifact@v4
        with:
          name: dist-mac-arm64
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: dist-win
          path: dist/

      - name: List artifacts
        run: ls -lh dist/

      - name: Verify tag exists on remote
        # Ensures the release is always created FROM an existing tag,
        # never the other way around (GitHub auto-creating a tag from a release).
        run: |
          if ! git ls-remote --tags origin "refs/tags/$TARGET_TAG" | grep -q .; then
            echo "::error::Tag $TARGET_TAG not found on remote. Push the tag before creating a release."
            exit 1
          fi
          echo "✓ Tag $TARGET_TAG confirmed on remote."

      - name: Create draft release from tag (if not exists)
        # --verify-tag: gh will error instead of auto-creating a missing tag
        # If the release already exists (e.g. release:created trigger), skip silently
        run: |
          if ! gh release view "$TARGET_TAG" > /dev/null 2>&1; then
            gh release create "$TARGET_TAG" \
              --title "$TARGET_TAG" \
              --generate-notes \
              --draft \
              --verify-tag
            echo "✓ Draft release $TARGET_TAG created."
          else
            echo "Release $TARGET_TAG already exists, uploading artifacts."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts to release
        run: gh release upload "$TARGET_TAG" dist/* --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
