name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── macOS arm64 (Apple Silicon) ─────────────────────────────────────────────
  build-mac-arm64:
    name: macOS arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Rebuild robotjs for Electron (arm64)
        run: pnpm exec electron-rebuild -f -w robotjs
        env:
          ELECTRON_RUN_AS_NODE: ''

      - name: Build & package
        run: pnpm exec electron-vite build && pnpm exec electron-builder --mac --arm64 --publish never
        env:
          ELECTRON_RUN_AS_NODE: ''

      - uses: actions/upload-artifact@v4
        with:
          name: dist-mac-arm64
          path: dist/*.dmg
          retention-days: 7

  # ── macOS x64 (Intel) ────────────────────────────────────────────────────────
  build-mac-x64:
    name: macOS x64
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Rebuild robotjs for Electron (x64)
        run: pnpm exec electron-rebuild -f -w robotjs
        env:
          ELECTRON_RUN_AS_NODE: ''

      - name: Build & package
        run: pnpm exec electron-vite build && pnpm exec electron-builder --mac --x64 --publish never
        env:
          ELECTRON_RUN_AS_NODE: ''

      - uses: actions/upload-artifact@v4
        with:
          name: dist-mac-x64
          path: dist/*.dmg
          retention-days: 7

  # ── Windows x64 ──────────────────────────────────────────────────────────────
  build-win:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Rebuild robotjs for Electron (Windows x64)
        # Use electron-rebuild directly — avoids the pnpm.cjs fork issue on Windows
        run: pnpm exec electron-rebuild -f -w robotjs
        env:
          ELECTRON_RUN_AS_NODE: ''

      - name: Build & package
        # Override npm_execpath so electron-builder uses npm (not pnpm.cjs) if it attempts
        # a secondary rebuild. --publish never avoids needing GH_TOKEN during build.
        run: pnpm exec electron-vite build && pnpm exec electron-builder --win --x64 --publish never
        env:
          ELECTRON_RUN_AS_NODE: ''
          npm_execpath: npm
          # Disable electron-builder's own native-rebuild attempt since we just rebuilt above
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: 'true'

      - uses: actions/upload-artifact@v4
        with:
          name: dist-win
          path: |
            dist/*.exe
            dist/*.msi
          retention-days: 7

  # ── GitHub Release (tags only) ───────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-mac-arm64, build-mac-x64, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist-mac-arm64
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: dist-mac-x64
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: dist-win
          path: dist/

      - name: List release artifacts
        run: ls -lh dist/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
