appId: com.mouseclick.app
productName: MouseClicker
copyright: Copyright © 2024 crazychenzi

directories:
  output: dist
  buildResources: resources

files:
  - out/**/*
  - '!**/.eslintrc.{js,cjs}'
  - '!**/{.DS_Store,.git,.hg,.svn,CVS,RCS,SCCS,.gitignore,.gitattributes}'

asar: true
asarUnpack:
  - resources/**
  - node_modules/robotjs/**

mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.utilities
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  extendInfo:
    NSAppleEventsUsageDescription: This app requires access to control your mouse.
    NSAccessibilityUsageDescription: This app requires Accessibility access to control your mouse.

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico

linux:
  target:
    - AppImage
  category: Utility

npmRebuild: true
