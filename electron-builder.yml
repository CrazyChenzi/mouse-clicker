appId: com.mouseclick.app
productName: MouseClicker
copyright: Copyright © 2024 crazychenzi

directories:
  output: dist
  buildResources: resources

files:
  - out/**/*
  - '!**/.eslintrc.{js,cjs}'
  - '!**/{.DS_Store,.git,.hg,.svn,CVS,RCS,SCCS,.gitignore,.gitattributes}'

asar: true
asarUnpack:
  - resources/**
  - node_modules/robotjs/**

# Native modules are rebuilt by electron-rebuild in CI before electron-builder runs.
# Disable electron-builder's own rebuild to avoid the pnpm.cjs fork issue on Windows.
npmRebuild: false

mac:
  target:
    - target: dmg
  category: public.app-category.utilities
  icon: resources/icons/mac/icon.icns
  extendInfo:
    NSAppleEventsUsageDescription: This app requires access to control your mouse.
    NSAccessibilityUsageDescription: This app requires Accessibility access to control your mouse.

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icons/win/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false

linux:
  target:
    - AppImage
  category: Utility
